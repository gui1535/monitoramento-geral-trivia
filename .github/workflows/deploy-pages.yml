name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Definir base do GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
          fi
          echo "VITE_BASE_PATH=${VITE_BASE_PATH}"

      - run: npm ci
      - run: npm run build

      - name: Verificar build
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "ERRO: build inválido (ainda aponta para src/main.jsx)"
            exit 1
          fi
          if grep -q '%BASE_URL%' dist/index.html; then
            echo "ERRO: build inválido (%BASE_URL% não foi substituído)"
            exit 1
          fi
          echo "index.html gerado:"
          cat dist/index.html

      - name: Copiar build para docs/
        run: |
          rm -rf docs
          cp -r dist docs
          cp dist/index.html docs/404.html

      - name: Commit docs/ na main
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'deploy: atualiza docs/ para GitHub Pages'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          file_pattern: docs/**
