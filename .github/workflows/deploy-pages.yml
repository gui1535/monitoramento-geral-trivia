name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Definir base do GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
          fi
          echo "Base: ${VITE_BASE_PATH:-/}"

      - run: npm ci
      - run: npm run build

      - name: Verificar build (não publicar código-fonte)
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo "ERRO: dist/index.html ainda aponta para src/main.jsx"
            exit 1
          fi
          echo "OK: dist/index.html"
          head -15 dist/index.html

      - name: Publicar dist na branch gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
