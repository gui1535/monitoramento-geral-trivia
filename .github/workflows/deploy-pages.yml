name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'index.dev.html'
      - 'public/**'
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Definir base do GitHub Pages
        run: |
          REPO="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO" = "${OWNER}.github.io" ]; then
            echo "VITE_BASE_PATH=/" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/${REPO}/" >> "$GITHUB_ENV"
          fi

      - run: npm ci
      - run: npm run build:pages

      - name: Verificar build
        run: |
          grep -q 'src/main.jsx' index.html && exit 1 || true
          grep -q '/assets/' index.html
          JS_FILE=$(grep -oE 'assets/index[^"]+\.js' index.html | head -1)
          test -f "$JS_FILE"
          grep -q 'Demo remota' "$JS_FILE"
          grep -q 'peerjs.com' "$JS_FILE"
          echo "Bundle OK: $JS_FILE"
          head -12 index.html

      - name: Commit arquivos do Pages
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'deploy: atualiza build na raiz e em docs/'
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          file_pattern: |
            docs/**
            index.html
            404.html
            assets/**
            favicon.svg
            config-fibra.json
            esquema-gerencia.svg
            logotipo-azul.png
            logotipo-branco.png
            .nojekyll
