<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>Redirecionando…</title>
    <script>
      // SPA no GitHub Pages — https://github.com/rafgraph/spa-github-pages
      // 1 segmento = nome do repositório (ex.: /monitoramento-geral-trivia/)
      var pathSegmentsToKeep = 1

      var location = window.location
      location.replace(
        location.protocol +
          '//' +
          location.host +
          location.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          location.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (location.search
            ? '&' + location.search.slice(1).replace(/&/g, '~and~')
            : '') +
          location.hash,
      )
    </script>
  </head>
  <body></body>
</html>
